name: GitHub Readme Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Generate the General Stats Card
      - name: Generate Stats Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: HawkOsm
          show_icons: true
          theme: dark
          filename: github-stats.svg

      # 2. Generate the Top Languages Card (New!)
      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: HawkOsm
          card: top-langs      # <--- This tells it to do languages
          layout: compact
          theme: dark
          filename: top-langs.svg

      - name: Deploy to Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add github-stats.svg top-langs.svg
          git commit -m "Update GitHub Stats and Languages" || exit 0
          git push
